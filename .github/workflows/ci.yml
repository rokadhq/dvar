name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Coverage
        if: matrix.node-version == 22
        run: npm run test:coverage
      - name: Verify package contents
        if: matrix.node-version == 22
        run: npm pack --workspace=@rokadhq/dvar --dry-run
