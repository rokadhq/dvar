name: Diagnose v0.6
on:
  pull_request:
    branches: [feat/v0.5-stdio-hardening]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - id: check
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: dvar-v06-check-log
          path: check.log
      - run: exit "${{ steps.check.outputs.status }}"
