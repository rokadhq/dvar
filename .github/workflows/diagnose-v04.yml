name: Diagnose v0.4

on:
  pull_request:
    branches:
      - feat/v0.3-approvals

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Capture check output
        id: check
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: dvar-v04-check-log
          path: check.log
          if-no-files-found: error
      - name: Preserve check result
        shell: bash
        run: exit "${{ steps.check.outputs.status }}"
